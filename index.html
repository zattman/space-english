<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🚀 宇宙英語 単語帳</title>
<meta property="og:title" content="🚀 宇宙英語 単語帳 — ZATT-MAN">
<meta property="og:description" content="宇宙×英語 30単語。NASAが使う本物の宇宙用語を会計士目線で学ぶ 🛸">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ZATT-MAN SPACE ENGLISH">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="🚀 宇宙英語 単語帳 — ZATT-MAN">
<meta name="twitter:description" content="宇宙×英語 30単語。NASAが使う本物の宇宙用語を会計士目線で学ぶ 🛸">
<meta name="theme-color" content="#0B1A2F">
<style>
:root {
  --gold:#FFD700; --accent:#1E8DE0; --orange:#FF7A28;
  --bg:#0B1A2F; --text:#ffffff; --subtext:#8899bb;
  --card-bg:rgba(255,255,255,.04); --card-border:rgba(255,255,255,.07);
  --ex-bg:rgba(11,26,47,0.97); --toc-hdr:rgba(11,26,47,.97);
}
[data-theme="light"] {
  --bg:#EDF4FF; --text:#0B1A2F; --subtext:#5577aa;
  --card-bg:rgba(255,255,255,.75); --card-border:rgba(11,26,47,.07);
  --ex-bg:rgba(237,244,255,.97); --toc-hdr:rgba(237,244,255,.97);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;transition:background .35s,color .35s;}

.stars-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 8% 7%,rgba(30,141,224,.55),transparent),
    radial-gradient(1.5px 1.5px at 23% 15%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 39% 5%,rgba(30,141,224,.60),transparent),
    radial-gradient(1px 1px at 54% 21%,rgba(255,255,255,.40),transparent),
    radial-gradient(1.5px 1.5px at 69% 10%,rgba(30,141,224,.55),transparent),
    radial-gradient(1px 1px at 85% 18%,rgba(255,255,255,.65),transparent),
    radial-gradient(1px 1px at 95% 34%,rgba(255,255,255,.35),transparent),
    radial-gradient(1px 1px at 5% 42%,rgba(30,141,224,.50),transparent),
    radial-gradient(1px 1px at 18% 55%,rgba(255,255,255,.40),transparent),
    radial-gradient(1.5px 1.5px at 48% 62%,rgba(30,141,224,.55),transparent),
    radial-gradient(1px 1px at 63% 70%,rgba(255,255,255,.45),transparent),
    radial-gradient(1px 1px at 90% 75%,rgba(255,255,255,.60),transparent),
    radial-gradient(1px 1px at 35% 88%,rgba(30,141,224,.40),transparent),
    radial-gradient(1.5px 1.5px at 60% 92%,rgba(255,255,255,.55),transparent);
  transition:opacity .35s;
}
[data-theme="light"] .stars-bg{opacity:0;}
[data-theme="light"] body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 600px 300px at 20% 10%,rgba(30,141,224,.08),transparent),
             radial-gradient(ellipse 400px 400px at 85% 85%,rgba(11,26,47,.05),transparent);
}

/* ── Theme toggle ── */
.theme-toggle{
  position:fixed;top:14px;right:70px;z-index:300;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);
  color:#667;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.theme-toggle:active{transform:scale(.9);}
[data-theme="light"] .theme-toggle{background:rgba(11,26,47,.06);border-color:rgba(11,26,47,.08);color:#446688;}

/* ══ TOC ══ */
#page-toc{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:transform .35s ease,opacity .35s ease;}
#page-toc.hidden{transform:translateY(-100%);opacity:0;pointer-events:none;}

.toc-header{padding:18px 20px 8px;text-align:center;flex-shrink:0;background:linear-gradient(180deg,var(--toc-hdr) 65%,transparent);}
.toc-logo{font-size:8px;letter-spacing:6px;color:rgba(30,141,224,.38);margin-bottom:6px;}
.toc-title{
  font-size:20px;font-weight:900;letter-spacing:3px;margin-bottom:3px;
  background:linear-gradient(135deg,var(--accent),#ffffff 55%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.toc-sub{font-size:8px;color:var(--subtext);letter-spacing:4px;}

.week-filter{display:flex;gap:6px;padding:8px 12px 6px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.week-filter::-webkit-scrollbar{display:none;}
.wf-btn{
  flex-shrink:0;padding:5px 12px;border-radius:14px;font-size:9px;font-weight:700;
  letter-spacing:1px;cursor:pointer;border:1px solid var(--card-border);
  color:var(--subtext);background:transparent;transition:all .2s;white-space:nowrap;
}
.wf-btn.active{background:rgba(30,141,224,.12);border-color:#1E8DE066;color:var(--accent);}

.toc-scroll{flex:1;overflow-y:auto;padding:6px 12px 24px;-webkit-overflow-scrolling:touch;}
.toc-week-header{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--subtext);padding:12px 4px 6px;text-transform:uppercase;opacity:.6;}
.toc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.toc-item{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:12px 11px 10px;cursor:pointer;
  transition:all .18s;display:flex;flex-direction:column;gap:2px;
  position:relative;overflow:hidden;
}
.toc-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c,transparent) 0%,transparent 68%);opacity:.055;pointer-events:none;}
.toc-item:active{transform:scale(.96);}
.toc-day{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--c,var(--accent));}
.toc-word{font-size:19px;font-weight:900;color:var(--text);line-height:1.1;}
.toc-meaning{font-size:11px;color:var(--subtext);margin-top:1px;}
.toc-tag-sm{font-size:8px;color:var(--subtext);margin-top:2px;line-height:1.3;opacity:.55;}
.toc-item.learned{opacity:.6;}
.toc-item.learned .toc-day::after{content:' ✓';color:#32c87a;}

/* ── Mascot ── */
.mascot-widget{
  display:flex;align-items:center;gap:10px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:14px;padding:8px 14px;margin:8px 16px 0;cursor:pointer;transition:background .2s;
}
.mascot-widget:active{background:rgba(255,255,255,.06);}
.mascot-face{font-size:32px;line-height:1;}
.mascot-info{flex:1;}
.mascot-name{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text);}
.mascot-lv{font-size:8px;color:var(--subtext);letter-spacing:1px;margin-top:2px;}
.mascot-bar{height:3px;background:var(--card-border);border-radius:2px;margin-top:6px;overflow:hidden;}
.mascot-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;background:linear-gradient(90deg,var(--accent),var(--gold));}
.mascot-pct{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1px;}
@keyframes mascotPop{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}
.mascot-face.pop{animation:mascotPop .4s ease;}

/* ── Quiz button ── */
.quiz-btn{
  margin:8px 16px 0;padding:10px 0;border-radius:12px;
  background:linear-gradient(135deg,rgba(30,141,224,.18),rgba(255,122,40,.10));
  border:1px solid rgba(30,141,224,.28);color:var(--accent);
  font-size:10px;font-weight:800;letter-spacing:3px;cursor:pointer;transition:all .22s;
  width:calc(100% - 32px);
}
.quiz-btn:active{background:rgba(30,141,224,.28);}

/* ══ FLASHCARD ══ */
#page-card{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;transition:transform .35s ease,opacity .35s ease;overflow:hidden;}
#page-card.hidden{transform:translateY(100%);opacity:0;pointer-events:none;}

.card-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 8px;flex-shrink:0;z-index:2;position:relative;}
.back-btn{background:var(--card-bg);border:1px solid var(--card-border);color:var(--subtext);font-size:10px;padding:7px 15px;border-radius:20px;cursor:pointer;letter-spacing:1.5px;transition:all .2s;}
.back-btn:active{background:rgba(255,255,255,.14);color:var(--text);}
.card-day-badge{font-size:9px;font-weight:700;letter-spacing:4px;padding:5px 16px;border-radius:14px;border:1px solid;}
.speak-btn{width:42px;height:42px;border-radius:50%;background:var(--card-bg);border:1px solid var(--card-border);color:var(--subtext);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.speak-btn:active{border-color:var(--accent);color:var(--accent);}

.card-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;text-align:center;user-select:none;cursor:pointer;position:relative;overflow:hidden;padding:0 32px;}
.card-scene{position:absolute;inset:0;pointer-events:none;z-index:0;transition:background-image .4s ease;}
[data-theme="light"] .card-scene{opacity:.15;}
.card-emoji{position:absolute;pointer-events:none;z-index:1;bottom:6%;right:-1%;font-size:clamp(110px,30vw,155px);line-height:1;opacity:0.06;transform:rotate(-10deg);transition:opacity .3s;user-select:none;}
.card-main.ex-open .card-emoji{opacity:0.028;}

.word-section{display:flex;flex-direction:column;align-items:center;pointer-events:none;position:relative;z-index:2;transition:transform .35s ease;}
.card-main.ex-open .word-section{transform:translateY(-16px);}

.card-cat{font-size:8px;font-weight:700;letter-spacing:4px;margin-bottom:14px;opacity:.55;text-transform:uppercase;}
.card-word{font-size:clamp(44px,12vw,80px);font-weight:900;line-height:1.02;letter-spacing:1px;margin-bottom:8px;}
.card-pron{font-size:14px;color:var(--subtext);letter-spacing:2px;margin-bottom:12px;font-style:italic;}
.card-line{width:52px;height:1.5px;border-radius:1px;margin-bottom:18px;}
.card-meaning{font-size:28px;font-weight:700;letter-spacing:2px;}
.tap-hint{font-size:8px;color:rgba(255,255,255,.15);letter-spacing:4px;margin-top:18px;transition:opacity .3s;}
[data-theme="light"] .tap-hint{color:rgba(11,26,47,.18);}
.card-main.ex-open .tap-hint{opacity:0;}

/* ── Example panel ── */
.ex-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--ex-bg);backdrop-filter:blur(20px);
  border-top:1px solid var(--card-border);border-radius:22px 22px 0 0;
  padding:6px 24px 22px;transform:translateY(100%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);z-index:5;cursor:default;
  overflow-y:auto;max-height:72vh;
}
.ex-panel.show{transform:translateY(0);}
.ex-handle{width:34px;height:3px;background:var(--card-border);border-radius:2px;margin:0 auto 14px;}
.ex-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ex-tag{font-size:8px;font-weight:700;letter-spacing:3px;}
.ex-speak-btn{width:34px;height:34px;border-radius:50%;background:var(--card-bg);border:1px solid var(--card-border);color:var(--subtext);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ex-speak-btn:active{border-color:var(--accent);color:var(--accent);}
.ex-speak-btn.playing{border-color:var(--accent);color:var(--accent);}
.ex-en{font-size:16px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:4px;}
.ex-jp{font-size:13px;color:var(--subtext);margin-bottom:12px;line-height:1.4;}
.ex-hr{height:1px;background:var(--card-border);margin-bottom:10px;}
.ex-naze-tag{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.ex-naze{font-size:12px;color:var(--subtext);line-height:1.7;margin-bottom:10px;}
.ex-x-tag{font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(30,141,224,.5);margin-bottom:4px;margin-top:4px;}
.ex-x{font-size:10px;color:var(--subtext);line-height:1.6;opacity:.7;}

/* ── Bottom nav ── */
.card-bottom{flex-shrink:0;padding:10px 24px 26px;display:flex;flex-direction:column;gap:12px;align-items:center;z-index:2;}
.card-counter{font-size:9px;color:var(--subtext);letter-spacing:4px;}
.card-nav{display:flex;align-items:center;gap:20px;}
.nav-btn{width:54px;height:54px;border-radius:50%;border:1px solid var(--card-border);background:var(--card-bg);color:rgba(255,255,255,.55);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;}
[data-theme="light"] .nav-btn{color:rgba(11,26,47,.55);}
.nav-btn:active{background:rgba(255,255,255,.13);color:var(--text);}
.nav-btn:disabled{opacity:.14;cursor:default;}
.progress-bar{width:100%;height:2px;background:var(--card-border);border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s ease;}

.card-main.fx-l{animation:fxL .28s ease forwards;}
.card-main.fx-r{animation:fxR .28s ease forwards;}
@keyframes fxL{0%{opacity:1;transform:none}38%{opacity:0;transform:translateX(-26px)}39%{opacity:0;transform:translateX(26px)}100%{opacity:1;transform:none}}
@keyframes fxR{0%{opacity:1;transform:none}38%{opacity:0;transform:translateX(26px)}39%{opacity:0;transform:translateX(-26px)}100%{opacity:1;transform:none}}

/* ── Learned ── */
.learned-btn{display:flex;align-items:center;gap:6px;padding:8px 20px;border-radius:20px;border:1.5px solid var(--card-border);background:var(--card-bg);color:var(--subtext);font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .25s;}
.learned-btn.done{border-color:#32c87a;color:#32c87a;background:rgba(50,200,122,.12);}
.learned-btn:active{transform:scale(.94);}

/* ── Quiz overlay ── */
.quiz-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;}
.quiz-overlay.hidden{display:none;}
.quiz-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--card-border);}
.quiz-close{background:none;border:none;color:var(--subtext);font-size:22px;cursor:pointer;padding:4px 10px;}
.quiz-progress-text{font-size:9px;color:var(--subtext);letter-spacing:3px;}
.quiz-score-badge{font-size:9px;color:#32c87a;letter-spacing:2px;font-weight:700;}
.quiz-card-area{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:18px;}
.quiz-word{font-size:clamp(46px,13vw,76px);font-weight:900;color:var(--text);text-align:center;letter-spacing:1px;line-height:1.1;}
.quiz-pron{font-size:14px;color:var(--subtext);letter-spacing:2px;font-style:italic;}
.quiz-meaning{font-size:26px;font-weight:700;color:var(--accent);min-height:36px;transition:opacity .25s;}
.quiz-meaning.hidden-val{opacity:0;pointer-events:none;}
.quiz-tap-hint{font-size:9px;color:var(--subtext);letter-spacing:4px;opacity:.5;}
.quiz-btns{width:100%;display:flex;gap:14px;padding:0 20px 32px;justify-content:center;}
.quiz-btn-learned{flex:1;padding:14px 0;border-radius:14px;background:rgba(50,200,122,.14);border:1.5px solid #32c87a;color:#32c87a;font-size:12px;font-weight:800;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.quiz-btn-learned:active{background:rgba(50,200,122,.26);transform:scale(.97);}
.quiz-btn-skip{flex:1;padding:14px 0;border-radius:14px;background:var(--card-bg);border:1.5px solid var(--card-border);color:var(--subtext);font-size:12px;font-weight:800;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.quiz-btn-skip:active{background:rgba(255,255,255,.09);transform:scale(.97);}
.quiz-result{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;}
.quiz-result.hidden{display:none;}
.quiz-result-emoji{font-size:64px;}
.quiz-result-title{font-size:20px;font-weight:800;color:var(--text);}
.quiz-result-sub{font-size:13px;color:var(--subtext);line-height:1.6;text-align:center;}
.quiz-result-btn{margin-top:10px;padding:12px 32px;border-radius:14px;background:rgba(30,141,224,.14);border:1.5px solid var(--accent);color:var(--accent);font-size:11px;font-weight:800;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.quiz-result-btn:active{background:rgba(30,141,224,.26);}
.quiz-bar{width:100%;height:3px;background:var(--card-border);}
.quiz-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#32c87a);transition:width .4s;}
</style>
</head>
<body>
<div class="stars-bg"></div>
<button class="theme-toggle" id="theme-toggle" title="ダーク / ライト切替">☀️</button>

<!-- ── TOC ── -->
<div id="page-toc">
  <div class="toc-header">
    <div class="toc-logo">ZATT-MAN × NASA ENGLISH</div>
    <div class="toc-title">宇宙英語 単語帳</div>
    <div class="toc-sub" id="toc-sub-stats">30 WORDS · 6 WEEKS</div>
  </div>
  <div class="mascot-widget" id="mascot-widget">
    <div class="mascot-face" id="mascot-face">🥚</div>

  <div class="week-filter" id="week-filter"></div>

</div>

<!-- ── FLASHCARD ── -->
<div id="page-card" class="hidden">
  <div class="card-topbar">
    <button class="back-btn" id="back-btn">← 一覧</button>
    <div class="card-day-badge" id="card-day">DAY 01</div>
    <button class="speak-btn" id="speak-btn">🔊</button>
  </div>
  <div class="card-main" id="card-main">
    <div class="card-scene" id="card-scene"></div>
    <div class="card-emoji" id="card-emoji"></div>
    <div class="word-section">
      <div class="card-cat" id="card-cat"></div>
      <div class="card-word" id="card-word"></div>
      <div class="card-pron" id="card-pron"></div>

      <div class="card-meaning" id="card-meaning"></div>

      <div class="ex-handle"></div>
      <div class="ex-tag-row">
        <div class="ex-tag" id="ex-tag">📝 EXAMPLE</div>

      </div>
      <div class="ex-en" id="ex-en"></div>

    </div>
  </div>
  <div class="card-bottom">
    <div class="card-counter" id="card-counter">1 / 30</div>
    <div class="card-nav">
      <button class="nav-btn" id="prev-btn">‹</button>
      <button class="learned-btn" id="learned-btn">✓ 覚えた</button>
      <button class="nav-btn" id="next-btn">›</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
</div>

<!-- ── Quiz Overlay ── -->
<div class="quiz-overlay hidden" id="quiz-overlay">
  <div class="quiz-bar"><div class="quiz-bar-fill" id="quiz-bar-fill" style="width:0%"></div></div>
  <div class="quiz-topbar">
    <button class="quiz-close" id="quiz-close-btn">✕</button>
    <div class="quiz-progress-text" id="quiz-progress-text">0 / 0</div>
    <div class="quiz-score-badge" id="quiz-score-badge">✓ 0</div>
  </div>
  <div class="quiz-card-area" id="quiz-card-area">

/* ── Learned state ── */
let LEARNED=JSON.parse(localStorage.getItem('spaceEn_learned')||'{}');
function saveLearned(){localStorage.setItem('spaceEn_learned',JSON.stringify(LEARNED));}
function learnedCount(){return Object.values(LEARNED).filter(Boolean).length;}
function toggleLearned(day){LEARNED[day]=!LEARNED[day];saveLearned();updateLearnedUI();}

/* ── Mascot ── */
const MASCOT_LEVELS=[
  {min:0,  max:0,   face:'🥚', name:'MISSION PATCH',    desc:'まだカウントダウン前'},
  {min:1,  max:4,   face:'🐣', name:'CADET',            desc:'訓練開始！最初の一歩'},
  {min:5,  max:9,   face:'🧑‍🚀',name:'SPACEWALKER',     desc:'宇宙語が身につき始めた'},
  {min:10, max:16,  face:'🚀', name:'MISSION SPECIALIST',desc:'星への扉が開いてきた！'},
  {min:17, max:22,  face:'⭐', name:'COMMANDER',         desc:'半分以上マスター！'},
  {min:23, max:27,  face:'🌟', name:'FLIGHT DIRECTOR',   desc:'もう少しで伝説の域へ…'},
  {min:28, max:30,  face:'🏆', name:'CHIEF ASTRONAUT',   desc:'全単語制覇！To infinity and beyond✨'},
];
function getMascotLevel(cnt){
  return MASCOT_LEVELS.slice().reverse().find(l=>cnt>=l.min)||MASCOT_LEVELS[0];
}
function updateLearnedUI(){
  const cnt=learnedCount();
  const pct=Math.round(cnt/WORDS.length*100);
  const lv=getMascotLevel(cnt);
  const face=document.getElementById('mascot-face');
  const oldFace=face.textContent;
  face.textContent=lv.face;
  if(lv.face!==oldFace){face.classList.remove('pop');void face.offsetWidth;face.classList.add('pop');}
  document.getElementById('mascot-name').textContent=lv.name;
  document.getElementById('mascot-lv').textContent=`習得率 ${pct}% — ${lv.desc}`;
  document.getElementById('mascot-bar').style.width=pct+'%';
  document.getElementById('mascot-pct').textContent=pct+'%';
  document.getElementById('toc-sub-stats').textContent=`${WORDS.length} WORDS · 6 WEEKS · ✓ ${cnt}`;
}

/* ── Quiz ── */
let quizDeck=[],quizIdx=0,quizScore=0,quizRevealed=false;
function startQuiz(){
  quizDeck=WORDS.filter(w=>!LEARNED[w.day]).sort(()=>Math.random()-.5);
  if(!quizDeck.length){alert('全単語習得済み！おめでとう🏆');return;}
  quizIdx=0;quizScore=0;
  document.getElementById('quiz-overlay').classList.remove('hidden');
  document.getElementById('quiz-result').classList.add('hidden');
  document.getElementById('quiz-card-area').style.display='flex';
  document.getElementById('quiz-btns').style.display='flex';
  showQuizCard();
}
function showQuizCard(){
  if(quizIdx>=quizDeck.length){endQuiz();return;}
  quizRevealed=false;
  const w=quizDeck[quizIdx];
  document.getElementById('quiz-word').textContent=w.word;
  document.getElementById('quiz-pron').textContent=w.pron;
  document.getElementById('quiz-meaning').textContent=w.meaning;
  document.getElementById('quiz-meaning').classList.add('hidden-val');
  document.getElementById('quiz-tap-hint').style.display='block';
  document.getElementById('quiz-progress-text').textContent=`${quizIdx+1} / ${quizDeck.length}`;
  document.getElementById('quiz-score-badge').textContent=`✓ ${quizScore}`;
  document.getElementById('quiz-bar-fill').style.width=`${(quizIdx/quizDeck.length)*100}%`;
}
function revealQuiz(){
  quizRevealed=true;
  document.getElementById('quiz-meaning').classList.remove('hidden-val');
  document.getElementById('quiz-tap-hint').style.display='none';
}
function endQuiz(){
  document.getElementById('quiz-card-area').style.display='none';
  document.getElementById('quiz-btns').style.display='none';
  document.getElementById('quiz-result').classList.remove('hidden');
  const total=quizDeck.length;
  const emojis=['😅','🙂','😊','😄','🌟','🚀','🏆'];
  document.getElementById('quiz-result-emoji').textContent=emojis[Math.min(Math.floor(quizScore/total*6),6)];
  document.getElementById('quiz-result-title').textContent='MISSION COMPLETE!';
  document.getElementById('quiz-result-sub').textContent=`${total}問中 ${quizScore}問クリア！\n習得済み: ${learnedCount()} / ${WORDS.length}語`;
}
document.getElementById('quiz-card-area').addEventListener('click',()=>{if(!quizRevealed)revealQuiz();});
document.getElementById('quiz-learned-btn').addEventListener('click',()=>{
  if(!quizRevealed){revealQuiz();return;}
  const w=quizDeck[quizIdx];LEARNED[w.day]=true;saveLearned();quizScore++;quizIdx++;showQuizCard();
});
document.getElementById('quiz-skip-btn').addEventListener('click',()=>{
  if(!quizRevealed){revealQuiz();return;}
  quizIdx++;showQuizCard();
});
document.getElementById('quiz-close-btn').addEventListener('click',()=>{
  document.getElementById('quiz-overlay').classList.add('hidden');
  updateLearnedUI();renderToc();
});
document.getElementById('quiz-again-btn').addEventListener('click',()=>startQuiz());
document.getElementById('quiz-start-btn').addEventListener('click',()=>startQuiz());

/* ── TOC ── */
let filterWeek='all';
function buildToc(){
  const wf=document.getElementById('week-filter');
  wf.innerHTML=`<button class="wf-btn active" data-w="all">ALL 30</button>`;
  for(let w=1;w<=6;w++){
    wf.innerHTML+=`<button class="wf-btn" data-w="${w}">W${w}</button>`;
  }
  wf.querySelectorAll('.wf-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      wf.querySelectorAll('.wf-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterWeek=btn.dataset.w;
      renderToc();
    });
  });
  renderToc();
}
function renderToc(){
  const body=document.getElementById('toc-body');
  const weeks=filterWeek==='all'?[1,2,3,4,5,6]:[parseInt(filterWeek)];
  let html='';
  weeks.forEach(wk=>{
    const ws=WORDS.filter(w=>w.week===wk);
    if(!ws.length)return;
    html+=`<div class="toc-week-header">WEEK ${wk} ─ ${WEEK_CAT[wk]}</div>`;
    html+='<div class="toc-grid">';
    ws.forEach(w=>{
      const idx=WORDS.indexOf(w);
      const learnedClass=LEARNED[w.day]?' learned':'';
      html+=`<div class="toc-item${learnedClass}" style="--c:${w.acc}" data-idx="${idx}">
        <div class="toc-day">DAY ${String(w.day).padStart(2,'0')}${w.gold?' ★':''}</div>
        <div class="toc-word">${w.word}</div>
        <div class="toc-meaning">${w.meaning}</div>
        <div class="toc-tag-sm">${w.tag}</div>
      </div>`;
    });
    html+='</div>';
  });
  body.innerHTML=html;
  body.querySelectorAll('.toc-item').forEach(el=>{
    el.addEventListener('click',()=>openCard(parseInt(el.dataset.idx)));
  });
}

/* ── Open / Render ── */
let cur=0,exOpen=false;
function openCard(idx){
  cur=idx;exOpen=false;render(null);
  document.getElementById('page-toc').classList.add('hidden');
  document.getElementById('page-card').classList.remove('hidden');
  speakNow();
}
function getEmoji(x){const m=x&&x.match(/^\p{Extended_Pictographic}/u);return m?m[0]:'🚀';}
function render(fx){
  const w=WORDS[cur];
  const main=document.getElementById('card-main');
  const panel=document.getElementById('ex-panel');
  exOpen=false;main.classList.remove('ex-open');panel.classList.remove('show');
  if(fx){main.classList.add(fx);setTimeout(()=>main.classList.remove(fx),300);}
  const[R,G,B]=w.planet[0].split(',').map(Number);
  const bgType=BG_CYCLE[(w.day-1)%BG_CYCLE.length];
  const starBg=w.gold?'star':bgType;
  document.getElementById('card-scene').style.backgroundImage=mkBg(starBg,R,G,B);
  document.getElementById('card-emoji').textContent=getEmoji(w.x);
  document.getElementById('card-cat').textContent=WEEK_CAT[w.week];
  document.getElementById('card-cat').style.color=w.acc;
  document.getElementById('card-day').textContent=`DAY ${String(w.day).padStart(2,'0')}`;
  document.getElementById('card-day').style.cssText=`border-color:${w.acc};color:${w.acc}`;
  document.getElementById('card-word').textContent=w.word;
  document.getElementById('card-word').style.cssText=`color:${w.gold?'#FFD700':'#ffffff'};text-shadow:0 0 36px ${w.acc}44,0 0 72px ${w.acc}18`;
  document.getElementById('card-pron').textContent=w.pron;
  document.getElementById('card-line').style.background=`linear-gradient(90deg,transparent,${w.acc},transparent)`;
  document.getElementById('card-meaning').textContent=w.meaning;
  document.getElementById('card-meaning').style.color=w.acc;
  document.getElementById('card-counter').textContent=`${cur+1} / ${WORDS.length}`;
  document.getElementById('prog-fill').style.width=`${((cur+1)/WORDS.length)*100}%`;
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=cur===WORDS.length-1;
  const lBtn=document.getElementById('learned-btn');
  const isL=!!LEARNED[w.day];
  lBtn.textContent=isL?'★ 習得済み':'✓ 覚えた';
  lBtn.classList.toggle('done',isL);
  document.getElementById('ex-tag').style.color=w.acc;
  document.getElementById('ex-en').textContent=w.ex_en;
  document.getElementById('ex-jp').textContent=w.ex_jp;
  document.getElementById('ex-naze').textContent=w.naze;
  document.getElementById('ex-x').textContent=w.x||'';
}

/* ── Interactions ── */
function toggleEx(){
  exOpen=!exOpen;
  document.getElementById('card-main').classList.toggle('ex-open',exOpen);
  document.getElementById('ex-panel').classList.toggle('show',exOpen);
}
const cardMain=document.getElementById('card-main');
let tapX,tapY,tapT;
cardMain.addEventListener('touchstart',e=>{tapX=e.touches[0].clientX;tapY=e.touches[0].clientY;tapT=Date.now();},{passive:true});
cardMain.addEventListener('touchend',e=>{
  if(Math.abs(e.changedTouches[0].clientX-tapX)<12&&Math.abs(e.changedTouches[0].clientY-tapY)<12&&Date.now()-tapT<300)toggleEx();
});
cardMain.addEventListener('click',e=>{if(!e.target.closest('.ex-panel'))toggleEx();});
document.getElementById('ex-panel').addEventListener('click',e=>e.stopPropagation());
document.getElementById('ex-panel').addEventListener('touchend',e=>e.stopPropagation());

let swX,swY;
const cardPage=document.getElementById('page-card');
cardPage.addEventListener('touchstart',e=>{swX=e.touches[0].clientX;swY=e.touches[0].clientY;},{passive:true});
cardPage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swX,dy=e.changedTouches[0].clientY-swY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44)go(dx<0?1:-1);
});
function go(dir){const n=cur+dir;if(n<0||n>=WORDS.length)return;cur=n;render(dir>0?'fx-l':'fx-r');speakNow();}
document.getElementById('prev-btn').addEventListener('click',()=>go(-1));
document.getElementById('next-btn').addEventListener('click',()=>go(1));
document.getElementById('back-btn').addEventListener('click',()=>{
  window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('page-card').classList.add('hidden');
  document.getElementById('page-toc').classList.remove('hidden');
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('page-card').classList.contains('hidden'))return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
  if(e.key===' '){e.preventDefault();toggleEx();}
  if(e.key==='Escape')document.getElementById('back-btn').click();
});
document.getElementById('learned-btn').addEventListener('click',()=>{
  toggleLearned(WORDS[cur].day);updateLearnedUI();
});

/* ── Speech (English) ── */
function speakNow(){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(WORDS[cur].word);
    u.lang='en-US';u.rate=0.8;u.pitch=1.0;
    window.speechSynthesis.speak(u);
  },320);
}
document.getElementById('speak-btn').addEventListener('click',speakNow);
function speakEx(){
  if(!window.speechSynthesis)return;
  const btn=document.getElementById('ex-speak-btn');
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(WORDS[cur].ex_en);
  u.lang='en-US';u.rate=0.78;u.pitch=1.0;
  u.onstart=()=>btn.classList.add('playing');
  u.onend=()=>btn.classList.remove('playing');
  u.onerror=()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}
document.getElementById('ex-speak-btn').addEventListener('click',e=>{e.stopPropagation();speakEx();});
document.getElementById('ex-speak-btn').addEventListener('touchend',e=>e.stopPropagation());

/* ── Theme toggle ── */
const THEME_KEY_EN='spaceEn_theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-toggle').textContent=t==='light'?'🌙':'☀️';
  localStorage.setItem(THEME_KEY_EN,t);
}
applyTheme(localStorage.getItem(THEME_KEY_EN)||'dark');
document.getElementById('theme-toggle').addEventListener('click',()=>{
  applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
});

/* ── Init ── */
buildToc();
updateLearnedUI();
</script>
